<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Virtual AIS Node</title>
  <link rel="icon"             type="image/png" href="{{ url_for('static', filename='favicon.png') }}">
  <link rel="shortcut icon"    type="image/png" href="{{ url_for('static', filename='favicon.png') }}">
  <link rel="apple-touch-icon"                  href="{{ url_for('static', filename='favicon.png') }}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body data-bs-theme="dark">

<header class="vaisn-navbar px-3 py-2 d-flex align-items-center">
  <a class="navbar-brand d-flex align-items-center text-decoration-none me-auto" href="/">
    <img src="{{ url_for('static', filename='logo.png') }}" alt="JLBMaritime" class="brand-logo me-2">
    Virtual AIS Node
  </a>
  <div class="d-flex align-items-center text-light">
    <span id="statusPill" class="badge bg-secondary">Stopped</span>
  </div>
</header>

<nav class="vaisn-subnav px-3">
  <ul class="nav">
    <li class="nav-item"><a class="nav-link {% if page=='dashboard' %}active{% endif %}"   href="/">Dashboard</a></li>
    <li class="nav-item"><a class="nav-link {% if page=='config' %}active{% endif %}"      href="/config">Configuration</a></li>
    <li class="nav-item"><a class="nav-link {% if page=='credentials' %}active{% endif %}" href="/credentials">Credentials</a></li>
    <li class="nav-item"><a class="nav-link {% if page=='logs' %}active{% endif %}"        href="/logs">Logs</a></li>
    <li class="nav-item"><a class="nav-link {% if page=='wifi' %}active{% endif %}"        href="/wifi">Wi-Fi</a></li>
  </ul>
</nav>

<main class="container-fluid py-4">
  {% block content %}{% endblock %}
</main>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="{{ url_for('static', filename='app.js') }}"></script>
{% block scripts %}{% endblock %}
</body>
</html>
